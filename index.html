<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Neural Randomness</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.4.2/aframe.min.js"></script>
</head>
<body>
<a-scene background="color: #020100" vr-mode-ui="enabled:true" id="scene">
  <a-light type="ambient" color="#ffcc44" intensity="0.3"></a-light>
  <a-light type="point" color="#ffaa00" intensity="0.5" position="0 0 0"></a-light>
  <a-entity id="rig" position="0 1.6 0">
    <a-camera id="cam" look-controls wasd-controls="enabled:false"></a-camera>
    <a-entity id="lh" hand-tracking-controls="hand:left;modelStyle:dots"></a-entity>
    <a-entity id="rh" hand-tracking-controls="hand:right;modelStyle:dots"></a-entity>
  </a-entity>
  <a-entity id="root" position="0 1.6 0"></a-entity>
  <a-sphere radius="16" material="color:#0a0800;side:back;opacity:1;transparent:false"></a-sphere>
</a-scene>

<script>
AFRAME.registerComponent('brain', {
  init: function() {
    const root = document.getElementById('root');
    const N = 55, R = 5;
    const neurons = [], conns = [], particles = [];
    let pulsePool = []; // reusable pulse dots on each connection
    let intensity = 0.1, prevRot = null, rotHist = [], burstCD = 0;
    let lWas = false, rWas = false;
    const MAX_ACTIVE_PULSES = 35;

    function rnd(a,b){return a+Math.random()*(b-a);}
    function lerp(a,b,t){return a+(b-a)*t;}
    function dist(a,b){return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2+(a.z-b.z)**2);}
    function toFixed(v){return parseFloat(v.toFixed(3));}

    // Yellow color from dim→bright
    function neuronColor(fire, inten) {
      const t = Math.min(1, fire + inten * 0.15);
      const r = Math.floor(lerp(80, 255, t));
      const g = Math.floor(lerp(50, 210, t));
      const b = Math.floor(lerp(5,  60,  t));
      return `rgb(${r},${g},${b})`;
    }
    function pulseColor(t) {
      // white-yellow core
      const r = Math.floor(lerp(255,255,t));
      const g = Math.floor(lerp(200,255,t));
      const b = Math.floor(lerp(20, 180,t));
      return `rgb(${r},${g},${b})`;
    }

    // ── Build neurons ────────────────────────────────────────────────────────
    for(let i=0;i<N;i++){
      const theta=rnd(0,Math.PI*2), phi=Math.acos(rnd(-1,1)), r=R*Math.cbrt(Math.random());
      const pos={x:r*Math.sin(phi)*Math.cos(theta), y:r*Math.sin(phi)*Math.sin(theta), z:r*Math.cos(phi)};
      const el=document.createElement('a-sphere');
      el.setAttribute('radius', rnd(0.06,0.11));
      el.setAttribute('position',`${toFixed(pos.x)} ${toFixed(pos.y)} ${toFixed(pos.z)}`);
      el.setAttribute('material','color:#aa6600;emissive:#aa6600;emissiveIntensity:1.5;shader:standard');
      el.setAttribute('segments-height',8); el.setAttribute('segments-width',8);
      root.appendChild(el);
      neurons.push({pos, el, fire:0, timer:rnd(30,70), glowEl:null});
    }

    // ── Build connections + a small dot per connection for pulse ─────────────
    for(let i=0;i<N;i++) for(let j=i+1;j<N;j++){
      const d=dist(neurons[i].pos,neurons[j].pos);
      if(d<3.2&&Math.random()<0.38){
        const a=neurons[i], b=neurons[j];
        const mx=toFixed((a.pos.x+b.pos.x)/2);
        const my=toFixed((a.pos.y+b.pos.y)/2);
        const mz=toFixed((a.pos.z+b.pos.z)/2);
        const dx=b.pos.x-a.pos.x, dy=b.pos.y-a.pos.y, dz=b.pos.z-a.pos.z;
        const ang=toFixed(Math.atan2(Math.sqrt(dx*dx+dz*dz),dy)*180/Math.PI-90);
        const ry=toFixed(Math.atan2(dx,dz)*180/Math.PI);

        // Axon line
        const line=document.createElement('a-cylinder');
        line.setAttribute('position',`${mx} ${my} ${mz}`);
        line.setAttribute('radius',0.006); line.setAttribute('height',toFixed(d));
        line.setAttribute('segments-radial',4); line.setAttribute('rotation',`${ang} ${ry} 0`);
        line.setAttribute('material','color:#553300;opacity:0.25;transparent:true;shader:standard');
        root.appendChild(line);

        // Pulse dot — one per connection, hidden until active
        const dot=document.createElement('a-sphere');
        dot.setAttribute('radius',0.04);
        dot.setAttribute('segments-height',5); dot.setAttribute('segments-width',5);
        dot.setAttribute('material','color:#ffee88;emissive:#ffcc00;emissiveIntensity:6;shader:standard');
        dot.setAttribute('visible','false');
        dot.setAttribute('position',`${toFixed(a.pos.x)} ${toFixed(a.pos.y)} ${toFixed(a.pos.z)}`);
        root.appendChild(dot);

        conns.push({a, b, line, dot, active:false, t:0, speed:2.2/(d*60), dir:1});
      }
    }

    // ── Dust particle pool (pre-create 120 tiny dots, reuse them) ───────────
    const DUST = 120;
    const dustPool = [];
    for(let i=0;i<DUST;i++){
      const el=document.createElement('a-sphere');
      el.setAttribute('radius',0.022);
      el.setAttribute('segments-height',4); el.setAttribute('segments-width',4);
      el.setAttribute('material','color:#ffdd44;emissive:#ffcc00;emissiveIntensity:5;shader:standard');
      el.setAttribute('visible','false');
      root.appendChild(el);
      dustPool.push({el, active:false, x:0,y:0,z:0, vx:0,vy:0,vz:0, life:0});
    }

    function spawnDust(pos, count) {
      let spawned=0;
      for(let i=0;i<DUST&&spawned<count;i++){
        const d=dustPool[i];
        if(!d.active){
          d.active=true; spawned++;
          d.x=pos.x; d.y=pos.y; d.z=pos.z;
          const speed=rnd(0.04,0.14);
          const theta=rnd(0,Math.PI*2), phi=Math.acos(rnd(-1,1));
          d.vx=speed*Math.sin(phi)*Math.cos(theta);
          d.vy=speed*Math.sin(phi)*Math.sin(theta);
          d.vz=speed*Math.cos(phi);
          d.life=1.0;
          d.el.setAttribute('visible','true');
          d.el.setAttribute('position',`${toFixed(d.x)} ${toFixed(d.y)} ${toFixed(d.z)}`);
        }
      }
    }

    // ── Fire a neuron ────────────────────────────────────────────────────────
    function fireNeuron(n, fromBurst) {
      if(!n) return;
      n.fire = 1.0;
      n.timer = rnd(45, Math.max(50, 150 - intensity*110));

      // Dust puff on every fire, bigger if from burst
      spawnDust(n.pos, fromBurst ? 18 : 5);

      // Activate connected axons
      let activated = 0;
      const shuffled = conns.filter(c=>c.a===n||c.b===n).sort(()=>Math.random()-0.5);
      shuffled.forEach(c=>{
        if(activated>=3) return; // max 3 axons per fire
        const totalActive = conns.filter(c=>c.active).length;
        if(totalActive >= MAX_ACTIVE_PULSES) return;
        if(Math.random() < 0.35 + intensity*0.4){
          c.active = true;
          c.t = 0;
          c.dir = c.a===n ? 1 : -1; // direction of travel
          c.dot.setAttribute('visible','true');
          activated++;
        }
      });
    }

    // ── Hand-targeted burst ──────────────────────────────────────────────────
    function triggerBurst(handId) {
      if(burstCD>0) return;
      burstCD = 70;
      intensity = Math.min(1, intensity + 0.45);

      const handEl = document.getElementById(handId);
      if(!handEl) return;

      // Get hand world position
      const handPos = new THREE.Vector3();
      handEl.object3D.getWorldPosition(handPos);

      // Convert to root local space
      const rootObj = document.getElementById('root');
      const local = handPos.clone();
      rootObj.object3D.worldToLocal(local);

      // Sort neurons by distance to hand position
      const sorted = neurons.slice().sort((a,b)=>{
        const da=dist(a.pos,{x:local.x,y:local.y,z:local.z});
        const db=dist(b.pos,{x:local.x,y:local.y,z:local.z});
        return da-db;
      });

      // Fire nearest 12 with staggered delay
      sorted.slice(0,12).forEach((n,i)=>{
        setTimeout(()=>fireNeuron(n, true), i*30 + rnd(0,15));
      });
    }

    function checkPinch(id) {
      const h=document.getElementById(id);
      if(!h) return false;
      const c=h.components&&h.components['hand-tracking-controls'];
      if(!c||!c.joints) return false;
      const T=c.joints['thumb-tip'], I=c.joints['index-finger-tip'];
      if(!T||!I) return false;
      const tp=new THREE.Vector3(), ip=new THREE.Vector3();
      T.getWorldPosition(tp); I.getWorldPosition(ip);
      return tp.distanceTo(ip) < 0.035;
    }

    // Initial kick
    setTimeout(()=>{
      for(let k=0;k<5;k++)
        setTimeout(()=>fireNeuron(neurons[Math.floor(Math.random()*N)],false), k*250);
    }, 700);

    const cam = document.getElementById('cam');

    // ── Main tick ────────────────────────────────────────────────────────────
    this.tick = function() {
      // Head rotation → intensity
      const rot = cam.object3D.rotation;
      let rv = 0;
      if(prevRot){
        const dx=rot.x-prevRot.x, dy=rot.y-prevRot.y, dz=rot.z-prevRot.z;
        rv = Math.sqrt(dx*dx+dy*dy+dz*dz)*60;
      }
      prevRot = {x:rot.x, y:rot.y, z:rot.z};
      rotHist.push(rv); if(rotHist.length>20) rotHist.shift();
      const avg = rotHist.reduce((s,v)=>s+v,0)/rotHist.length;
      intensity = lerp(intensity, Math.min(1, 0.08+avg*4), 0.06);
      intensity = Math.max(0.04, intensity-0.001);
      if(burstCD>0) burstCD--;

      // Pinch → burst at hand location
      const lP=checkPinch('lh'), rP=checkPinch('rh');
      if(lP&&!lWas) triggerBurst('lh');
      if(rP&&!rWas) triggerBurst('rh');
      lWas=lP; rWas=rP;

      // ── Update neurons ───────────────────────────────────────────────────
      neurons.forEach(n=>{
        n.timer -= 1;
        if(n.timer<=0) fireNeuron(n,false);
        else if(Math.random() < 0.0006+intensity*0.006) fireNeuron(n,false);
        n.fire = Math.max(0, n.fire-0.055);
        const col = neuronColor(n.fire, intensity);
        const ei = (1.2 + n.fire*4).toFixed(2);
        n.el.setAttribute('material',`color:${col};emissive:${col};emissiveIntensity:${ei};shader:standard`);
      });

      // ── Update pulses (dots travelling along axons) ──────────────────────
      conns.forEach(c=>{
        if(!c.active) return;
        c.t += c.speed * (1 + intensity*1.8);
        if(c.t>=1){
          c.active=false; c.t=0;
          c.dot.setAttribute('visible','false');
          const target = c.dir===1 ? c.b : c.a;
          if(Math.random()<0.55) fireNeuron(target,false);
          // Glow axon briefly
          c.line.setAttribute('material','color:#ffcc00;opacity:0.7;transparent:true;shader:standard');
          setTimeout(()=>{
            c.line.setAttribute('material','color:#553300;opacity:0.25;transparent:true;shader:standard');
          }, 180);
        } else {
          const from = c.dir===1 ? c.a : c.b;
          const to   = c.dir===1 ? c.b : c.a;
          const x=lerp(from.pos.x,to.pos.x,c.t);
          const y=lerp(from.pos.y,to.pos.y,c.t);
          const z=lerp(from.pos.z,to.pos.z,c.t);
          c.dot.setAttribute('position',`${toFixed(x)} ${toFixed(y)} ${toFixed(z)}`);
          // Pulse color brightens toward end
          const pc=pulseColor(c.t);
          c.dot.setAttribute('material',`color:${pc};emissive:${pc};emissiveIntensity:6;shader:standard`);
        }
      });

      // ── Update dust particles ────────────────────────────────────────────
      dustPool.forEach(d=>{
        if(!d.active) return;
        d.life -= 0.045;
        if(d.life<=0){
          d.active=false;
          d.el.setAttribute('visible','false');
          return;
        }
        d.x+=d.vx; d.y+=d.vy; d.z+=d.vz;
        d.vx*=0.92; d.vy*=0.92; d.vz*=0.92; // drag
        d.el.setAttribute('position',`${toFixed(d.x)} ${toFixed(d.y)} ${toFixed(d.z)}`);
        const alpha = d.life;
        const r=Math.floor(lerp(180,255,alpha));
        const g=Math.floor(lerp(100,220,alpha));
        const b=Math.floor(lerp(0,60,alpha));
        const ei=(alpha*5).toFixed(2);
        d.el.setAttribute('material',`color:rgb(${r},${g},${b});emissive:rgb(${r},${g},${b});emissiveIntensity:${ei};shader:standard`);
      });
    };
  }
});

document.querySelector('a-scene').setAttribute('brain','');
</script>
</body>
</html>
