<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Neural Randomness</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.4.2/aframe.min.js"></script>
</head>
<body>
<a-scene background="color: #010100" vr-mode-ui="enabled:true" id="scene">
  <a-light type="ambient" color="#1a0e00" intensity="2"></a-light>
  <a-entity position="0 1.6 0">
    <a-camera id="cam" look-controls wasd-controls="enabled:false"></a-camera>
    <a-entity id="lh" hand-tracking-controls="hand:left;modelStyle:dots"></a-entity>
    <a-entity id="rh" hand-tracking-controls="hand:right;modelStyle:dots"></a-entity>
  </a-entity>
  <a-entity id="root" position="0 1.6 0"></a-entity>
  <a-sphere radius="16" position="0 1.6 0" material="color:#050300;side:back;transparent:false"></a-sphere>
</a-scene>

<script>
AFRAME.registerComponent('brain', {
  init: function() {
    const root = document.getElementById('root');
    const N = 55, R = 5;
    const neurons = [], conns = [], dust = [], ring = [];
    let intensity = 0, prevRot = null, rotHist = [];
    let burstLocked = false;
    let linesLit = false;

    const glitterColors = [
      {r:255,g:220,b:50},{r:255,g:100,b:220},{r:80,g:220,b:255},
      {r:255,g:255,b:255},{r:180,g:120,b:255},{r:255,g:160,b:60},{r:120,g:255,b:180}
    ];

    function rnd(a,b){return a+Math.random()*(b-a);}
    function lerp(a,b,t){return a+(b-a)*t;}
    function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
    function distL(a,b){return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2+(a.z-b.z)**2);}
    function fmt(v){return parseFloat(v.toFixed(3));}

    // ── Open palm detection ───────────────────────────────────────────────
    // Open palm = all 4 fingertips are far from the wrist
    // Closed hand = fingertips close to wrist
    // Much simpler and more reliable than fist detection
    function isOpenPalm(handEl){
      const c = handEl.components && handEl.components['hand-tracking-controls'];
      if(!c || !c.joints) return false;
      const wrist     = c.joints['wrist'];
      const indexTip  = c.joints['index-finger-tip'];
      const middleTip = c.joints['middle-finger-tip'];
      const ringTip   = c.joints['ring-finger-tip'];
      const pinkyTip  = c.joints['pinky-finger-tip'];
      if(!wrist || !indexTip || !middleTip || !ringTip || !pinkyTip) return false;
      const wp = new THREE.Vector3();
      const ip = new THREE.Vector3();
      const mp = new THREE.Vector3();
      const rp = new THREE.Vector3();
      const pp = new THREE.Vector3();
      wrist.getWorldPosition(wp);
      // Skip if wrist not tracked
      if(wp.lengthSq() < 0.0001) return false;
      indexTip.getWorldPosition(ip);
      middleTip.getWorldPosition(mp);
      ringTip.getWorldPosition(rp);
      pinkyTip.getWorldPosition(pp);
      // All fingertips must be more than 0.1m from wrist = open hand
      return (
        ip.distanceTo(wp) > 0.10 &&
        mp.distanceTo(wp) > 0.10 &&
        rp.distanceTo(wp) > 0.10 &&
        pp.distanceTo(wp) > 0.09
      );
    }

    // ── Light up / dim all lines ──────────────────────────────────────────
    function setLinesLit(lit){
      if(linesLit === lit) return;
      linesLit = lit;
      conns.forEach(c=>{
        if(c.active) return;
        if(lit){
          c.line.setAttribute('material','color:#ffdd00;emissive:#ffaa00;emissiveIntensity:4;opacity:0.95;transparent:true;shader:standard');
        } else {
          c.line.setAttribute('material','color:#aa6600;emissive:#331800;emissiveIntensity:1;opacity:0.5;transparent:true;shader:standard');
        }
      });
      if(lit){
        // Cascade fire across all neurons when palm opens
        neurons.forEach((n,i)=>setTimeout(()=>fireNeuron(n,false), i*10 + rnd(0,8)));
      }
    }

    // ── Dust ─────────────────────────────────────────────────────────────
    for(let i=0;i<300;i++){
      const el=document.createElement('a-sphere');
      el.setAttribute('radius',0.008);
      el.setAttribute('segments-height',4);el.setAttribute('segments-width',4);
      el.setAttribute('material','color:#ffee88;emissive:#ffcc00;emissiveIntensity:8;shader:standard');
      el.setAttribute('visible','false');
      root.appendChild(el);
      dust.push({el,active:false,x:0,y:0,z:0,vx:0,vy:0,vz:0,life:0,col:null});
    }
    function spawnDust(pos,count,isBurst){
      let n=0;
      for(let i=0;i<dust.length&&n<count;i++){
        const d=dust[i];if(d.active)continue;
        d.active=true;n++;
        d.x=pos.x;d.y=pos.y;d.z=pos.z;
        d.col=isBurst?glitterColors[Math.floor(Math.random()*glitterColors.length)]:{r:255,g:180,b:40};
        const spd=isBurst?rnd(0.06,0.20):rnd(0.01,0.05);
        const theta=rnd(0,Math.PI*2),phi=Math.acos(rnd(-1,1));
        d.vx=spd*Math.sin(phi)*Math.cos(theta);
        d.vy=spd*Math.sin(phi)*Math.sin(theta);
        d.vz=spd*Math.cos(phi);
        d.life=isBurst?1.0:0.6;
        d.el.setAttribute('visible','true');
        d.el.setAttribute('position',`${fmt(d.x)} ${fmt(d.y)} ${fmt(d.z)}`);
      }
    }

    // ── Ring ─────────────────────────────────────────────────────────────
    for(let i=0;i<32;i++){
      const el=document.createElement('a-sphere');
      el.setAttribute('radius',0.025);
      el.setAttribute('segments-height',4);el.setAttribute('segments-width',4);
      el.setAttribute('material','color:#ffffff;emissive:#ccaaff;emissiveIntensity:9;shader:standard');
      el.setAttribute('visible','false');
      root.appendChild(el);
      ring.push({el,active:false,angle:(i/32)*Math.PI*2,cx:0,cy:0,cz:0,r:0,life:0});
    }
    function spawnRing(pos){
      ring.forEach(d=>{d.active=true;d.cx=pos.x;d.cy=pos.y;d.cz=pos.z;d.r=0.05;d.life=1.0;d.el.setAttribute('visible','true');});
    }

    // ── Neurons ───────────────────────────────────────────────────────────
    for(let i=0;i<N;i++){
      const theta=rnd(0,Math.PI*2),phi=Math.acos(rnd(-1,1)),r=R*Math.cbrt(Math.random());
      const pos={x:r*Math.sin(phi)*Math.cos(theta),y:r*Math.sin(phi)*Math.sin(theta),z:r*Math.cos(phi)};
      const el=document.createElement('a-sphere');
      el.setAttribute('radius',rnd(0.06,0.11));
      el.setAttribute('position',`${fmt(pos.x)} ${fmt(pos.y)} ${fmt(pos.z)}`);
      el.setAttribute('material','color:#331800;emissive:#331800;emissiveIntensity:1;shader:standard');
      el.setAttribute('segments-height',8);el.setAttribute('segments-width',8);
      root.appendChild(el);
      neurons.push({pos,el,fire:0,timer:rnd(80,200)});
    }

    // ── Connections ───────────────────────────────────────────────────────
    for(let i=0;i<N;i++) for(let j=i+1;j<N;j++){
      const d=distL(neurons[i].pos,neurons[j].pos);
      if(d<3.2&&Math.random()<0.38){
        const a=neurons[i],b=neurons[j];
        const mx=fmt((a.pos.x+b.pos.x)/2),my=fmt((a.pos.y+b.pos.y)/2),mz=fmt((a.pos.z+b.pos.z)/2);
        const dx=b.pos.x-a.pos.x,dy=b.pos.y-a.pos.y,dz=b.pos.z-a.pos.z;
        const ang=fmt(Math.atan2(Math.sqrt(dx*dx+dz*dz),dy)*180/Math.PI-90);
        const ry=fmt(Math.atan2(dx,dz)*180/Math.PI);
        const line=document.createElement('a-cylinder');
        line.setAttribute('position',`${mx} ${my} ${mz}`);
        line.setAttribute('radius',0.005);line.setAttribute('height',fmt(d));
        line.setAttribute('segments-radial',4);line.setAttribute('rotation',`${ang} ${ry} 0`);
        line.setAttribute('material','color:#aa6600;emissive:#331800;emissiveIntensity:1;opacity:0.5;transparent:true;shader:standard');
        root.appendChild(line);
        const dot=document.createElement('a-sphere');
        dot.setAttribute('radius',0.038);
        dot.setAttribute('segments-height',5);dot.setAttribute('segments-width',5);
        dot.setAttribute('material','color:#ffe066;emissive:#ffcc00;emissiveIntensity:7;shader:standard');
        dot.setAttribute('visible','false');
        dot.setAttribute('position',`${fmt(a.pos.x)} ${fmt(a.pos.y)} ${fmt(a.pos.z)}`);
        root.appendChild(dot);
        conns.push({a,b,line,dot,active:false,t:0,speed:1.8/(d*60),dir:1,flashTimer:0});
      }
    }

    // ── Fire neuron ───────────────────────────────────────────────────────
    function fireNeuron(n,isBurst){
      if(!n)return;
      n.fire=1.0;
      n.timer=isBurst?rnd(20,40):rnd(60,Math.max(70,220-intensity*160));
      spawnDust(n.pos,isBurst?35:3,isBurst);
      if(isBurst)spawnRing(n.pos);
      let activated=0;
      conns.filter(c=>c.a===n||c.b===n).sort(()=>Math.random()-0.5).forEach(c=>{
        if(activated>=(isBurst?4:2))return;
        if(Math.random()<(isBurst?0.85:0.2+intensity*0.35)){
          c.active=true;c.t=0;c.dir=c.a===n?1:-1;
          c.dot.setAttribute('visible','true');activated++;
        }
      });
    }

    function triggerBurst(){
      if(burstLocked)return;
      burstLocked=true;
      setTimeout(()=>{burstLocked=false;},1000);
      intensity=Math.min(1,intensity+0.5);
      fireNeuron(neurons[Math.floor(Math.random()*neurons.length)],true);
    }

    // ── Pinch = burst ─────────────────────────────────────────────────────
    const lh=document.getElementById('lh');
    const rh=document.getElementById('rh');
    lh.addEventListener('pinchstarted',triggerBurst);
    rh.addEventListener('pinchstarted',triggerBurst);

    document.getElementById('scene').addEventListener('enter-vr',()=>{
      const sess=document.getElementById('scene').xrSession;
      if(!sess)return;
      sess.addEventListener('selectstart',triggerBurst);
    });

    let lWasPinch=false, rWasPinch=false;
    let lWasPalm=false, rWasPalm=false;

    function isPinching(handEl){
      const c=handEl.components&&handEl.components['hand-tracking-controls'];
      if(!c||!c.joints)return false;
      const T=c.joints['thumb-tip'],I=c.joints['index-finger-tip'];
      if(!T||!I)return false;
      const tp=new THREE.Vector3(),ip=new THREE.Vector3();
      T.getWorldPosition(tp);I.getWorldPosition(ip);
      if(tp.lengthSq()<0.0001)return false;
      return tp.distanceTo(ip)<0.032;
    }

    setTimeout(()=>{
      for(let k=0;k<3;k++)
        setTimeout(()=>fireNeuron(neurons[Math.floor(Math.random()*N)],false),k*500);
    },800);

    const cam=document.getElementById('cam');

    this.tick=function(){
      const rot=cam.object3D.rotation;
      let rv=0;
      if(prevRot){const dx=rot.x-prevRot.x,dy=rot.y-prevRot.y,dz=rot.z-prevRot.z;rv=Math.sqrt(dx*dx+dy*dy+dz*dz)*60;}
      prevRot={x:rot.x,y:rot.y,z:rot.z};
      rotHist.push(rv);if(rotHist.length>20)rotHist.shift();
      const avg=rotHist.reduce((s,v)=>s+v,0)/rotHist.length;
      intensity=lerp(intensity,clamp(avg*3.5,0,1),0.05);
      intensity=Math.max(0,intensity-0.0015);

      // Pinch fallback
      const lP=isPinching(lh),rP=isPinching(rh);
      if(lP&&!lWasPinch)triggerBurst();
      if(rP&&!rWasPinch)triggerBurst();
      lWasPinch=lP;rWasPinch=rP;

      // Open palm → light up lines
      const lPalm=isOpenPalm(lh), rPalm=isOpenPalm(rh);
      const anyPalm=lPalm||rPalm;
      if(anyPalm!==linesLit) setLinesLit(anyPalm);
      lWasPalm=lPalm;rWasPalm=rPalm;

      neurons.forEach(n=>{
        n.timer-=1;
        const chance=intensity>0.05?0.0004+intensity*0.005:0.00012;
        if(n.timer<=0||Math.random()<chance)fireNeuron(n,false);
        n.fire=Math.max(0,n.fire-0.05);
        const t=clamp(n.fire+intensity*0.2,0,1);
        const r=Math.floor(lerp(50,255,t)),g=Math.floor(lerp(25,200,t)),b=Math.floor(lerp(0,30,t));
        n.el.setAttribute('material',`color:rgb(${r},${g},${b});emissive:rgb(${r},${g},${b});emissiveIntensity:${(0.8+t*5).toFixed(2)};shader:standard`);
      });

      conns.forEach(c=>{
        if(c.flashTimer>0){
          c.flashTimer--;
          if(c.flashTimer===0){
            if(!c.active){
              if(linesLit){
                c.line.setAttribute('material','color:#ffdd00;emissive:#ffaa00;emissiveIntensity:4;opacity:0.95;transparent:true;shader:standard');
              } else {
                c.line.setAttribute('material','color:#aa6600;emissive:#331800;emissiveIntensity:1;opacity:0.5;transparent:true;shader:standard');
              }
            }
          }
        }
        if(!c.active)return;
        c.t+=c.speed*(1+intensity*2);
        if(c.t>=1){
          c.active=false;c.t=0;c.dot.setAttribute('visible','false');
          c.line.setAttribute('material','color:#ffcc00;opacity:0.9;transparent:true;shader:standard');
          c.flashTimer=12;
          if(Math.random()<0.5)fireNeuron(c.dir===1?c.b:c.a,false);
        } else {
          const from=c.dir===1?c.a:c.b,to=c.dir===1?c.b:c.a;
          const x=lerp(from.pos.x,to.pos.x,c.t),y=lerp(from.pos.y,to.pos.y,c.t),z=lerp(from.pos.z,to.pos.z,c.t);
          c.dot.setAttribute('position',`${fmt(x)} ${fmt(y)} ${fmt(z)}`);
          const bright=clamp(c.t*1.5,0,1);
          const gr=Math.floor(lerp(180,255,bright));
          c.dot.setAttribute('material',`color:rgb(255,${gr},80);emissive:rgb(255,${gr},40);emissiveIntensity:8;shader:standard`);
        }
      });

      dust.forEach(d=>{
        if(!d.active)return;
        d.life-=0.028;
        if(d.life<=0){d.active=false;d.el.setAttribute('visible','false');return;}
        d.x+=d.vx;d.y+=d.vy;d.z+=d.vz;
        d.vx*=0.93;d.vy*=0.93;d.vz*=0.93;
        d.el.setAttribute('position',`${fmt(d.x)} ${fmt(d.y)} ${fmt(d.z)}`);
        const flicker=0.7+Math.random()*0.3;
        const r=Math.floor(d.col.r*flicker),g=Math.floor(d.col.g*flicker),b=Math.floor(d.col.b*flicker);
        d.el.setAttribute('material',`color:rgb(${r},${g},${b});emissive:rgb(${r},${g},${b});emissiveIntensity:${(d.life*9).toFixed(2)};shader:standard`);
      });

      ring.forEach(d=>{
        if(!d.active)return;
        d.r+=0.13;d.life-=0.025;
        if(d.life<=0){d.active=false;d.el.setAttribute('visible','false');return;}
        const x=d.cx+d.r*Math.cos(d.angle),z=d.cz+d.r*Math.sin(d.angle);
        d.el.setAttribute('position',`${fmt(x)} ${fmt(d.cy)} ${fmt(z)}`);
        const g=Math.floor(lerp(140,255,d.life));
        d.el.setAttribute('material',`color:rgb(255,${g},255);emissive:rgb(200,${g},255);emissiveIntensity:${(d.life*9).toFixed(2)};shader:standard`);
      });
    };
  }
});

document.querySelector('a-scene').setAttribute('brain','');
</script>
</body>
</html>
