<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Neural Randomness</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.4.2/aframe.min.js"></script>
</head>
<body>
<a-scene background="color: #000008" vr-mode-ui="enabled: true" id="scene">
  <a-light type="ambient" color="#ffffff" intensity="2"></a-light>
  <a-entity id="rig" position="0 1.6 0">
    <a-camera id="cam" look-controls wasd-controls="enabled:false"></a-camera>
    <a-entity id="lh" hand-tracking-controls="hand:left;modelStyle:dots"></a-entity>
    <a-entity id="rh" hand-tracking-controls="hand:right;modelStyle:dots"></a-entity>
  </a-entity>
  <a-entity id="root" position="0 1.6 0"></a-entity>
  <a-sphere radius="16" material="color:#000020;side:back;opacity:0.9;transparent:true"></a-sphere>
</a-scene>

<script>
AFRAME.registerComponent('brain', {
  init: function() {
    const root = document.getElementById('root');
    const N = 60, R = 5, neurons = [], conns = [], pulses = [];
    let intensity = 0.1, prevRot = null, rotHist = [], burstCD = 0;
    let lWas = false, rWas = false;
    const MAX_PULSES = 40; // cap so it doesn't go crazy

    function rnd(a,b){return a+Math.random()*(b-a);}
    function lerp(a,b,t){return a+(b-a)*t;}
    function dist(a,b){return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2+(a.z-b.z)**2);}

    for(let i=0;i<N;i++){
      const theta=rnd(0,Math.PI*2),phi=Math.acos(rnd(-1,1)),r=R*Math.cbrt(Math.random());
      const pos={x:r*Math.sin(phi)*Math.cos(theta),y:r*Math.sin(phi)*Math.sin(theta),z:r*Math.cos(phi)};
      const el=document.createElement('a-sphere');
      el.setAttribute('radius',rnd(0.055,0.10));
      el.setAttribute('position',`${pos.x.toFixed(3)} ${pos.y.toFixed(3)} ${pos.z.toFixed(3)}`);
      el.setAttribute('material','color:#3366ff;emissive:#2255dd;emissiveIntensity:2;shader:standard');
      el.setAttribute('segments-height',8);el.setAttribute('segments-width',8);
      root.appendChild(el);
      neurons.push({pos,el,fire:0,timer:rnd(30,80)});
    }

    for(let i=0;i<N;i++) for(let j=i+1;j<N;j++){
      if(dist(neurons[i].pos,neurons[j].pos)<3.0&&Math.random()<0.35){
        const a=neurons[i],b=neurons[j];
        const mx=((a.pos.x+b.pos.x)/2).toFixed(3);
        const my=((a.pos.y+b.pos.y)/2).toFixed(3);
        const mz=((a.pos.z+b.pos.z)/2).toFixed(3);
        const d=dist(a.pos,b.pos);
        const dx=b.pos.x-a.pos.x,dy=b.pos.y-a.pos.y,dz=b.pos.z-a.pos.z;
        const ang=(Math.atan2(Math.sqrt(dx*dx+dz*dz),dy)*180/Math.PI-90).toFixed(2);
        const ry=(Math.atan2(dx,dz)*180/Math.PI).toFixed(2);
        const el=document.createElement('a-cylinder');
        el.setAttribute('position',`${mx} ${my} ${mz}`);
        el.setAttribute('radius',0.007);el.setAttribute('height',d.toFixed(3));
        el.setAttribute('segments-radial',4);el.setAttribute('rotation',`${ang} ${ry} 0`);
        el.setAttribute('material','color:#3355aa;opacity:0.18;transparent:true;shader:standard');
        root.appendChild(el);
        conns.push({a,b,el,active:false});
      }
    }

    function fireNeuron(n){
      if(!n)return;
      n.fire=1.0;
      n.timer=rnd(40,Math.max(50,140-intensity*100));
      if(pulses.length>=MAX_PULSES)return; // stop avalanche
      conns.filter(c=>c.a===n||c.b===n).forEach(c=>{
        if(pulses.length>=MAX_PULSES)return;
        if(Math.random()<0.3+intensity*0.35){
          const from=c.a===n?c.a:c.b,to=c.a===n?c.b:c.a;
          const el=document.createElement('a-sphere');
          el.setAttribute('radius',0.05);
          el.setAttribute('segments-height',6);el.setAttribute('segments-width',6);
          el.setAttribute('material','color:#ffffff;emissive:#88eeff;emissiveIntensity:5;shader:standard');
          el.setAttribute('position',`${from.pos.x.toFixed(3)} ${from.pos.y.toFixed(3)} ${from.pos.z.toFixed(3)}`);
          root.appendChild(el);
          pulses.push({from,to,t:0,speed:2.0/(dist(from.pos,to.pos)*60),el,conn:c});
          c.active=true;
        }
      });
    }

    function triggerBurst(){
      if(burstCD>0)return;
      burstCD=80;
      intensity=Math.min(1,intensity+0.4);
      neurons.slice().sort(()=>Math.random()-0.5).slice(0,10)
        .forEach((n,i)=>setTimeout(()=>fireNeuron(n),i*40+rnd(0,20)));
    }

    function checkPinch(id){
      const h=document.getElementById(id);
      if(!h)return false;
      const c=h.components&&h.components['hand-tracking-controls'];
      if(!c||!c.joints)return false;
      const T=c.joints['thumb-tip'],I=c.joints['index-finger-tip'];
      if(!T||!I)return false;
      const tp=new THREE.Vector3(),ip=new THREE.Vector3();
      T.getWorldPosition(tp);I.getWorldPosition(ip);
      return tp.distanceTo(ip)<0.035;
    }

    // Kick off a few neurons after half a second
    setTimeout(()=>{
      for(let k=0;k<6;k++)
        setTimeout(()=>fireNeuron(neurons[Math.floor(Math.random()*N)]),k*200);
    },600);

    const cam=document.getElementById('cam');

    // Use A-Frame's tick via the component — works in both flat and VR mode
    this.tick = function(){
      const rot=cam.object3D.rotation;
      let rv=0;
      if(prevRot){
        const dx=rot.x-prevRot.x,dy=rot.y-prevRot.y,dz=rot.z-prevRot.z;
        rv=Math.sqrt(dx*dx+dy*dy+dz*dz)*60;
      }
      prevRot={x:rot.x,y:rot.y,z:rot.z};
      rotHist.push(rv);if(rotHist.length>20)rotHist.shift();
      const avg=rotHist.reduce((s,v)=>s+v,0)/rotHist.length;
      intensity=lerp(intensity,Math.min(1,0.1+avg*4),0.06);
      intensity=Math.max(0.05,intensity-0.001);
      if(burstCD>0)burstCD--;

      const lP=checkPinch('lh'),rP=checkPinch('rh');
      if(lP&&!lWas)triggerBurst();
      if(rP&&!rWas)triggerBurst();
      lWas=lP;rWas=rP;

      // Spontaneous firing — rate limited
      neurons.forEach(n=>{
        n.timer-=1;
        if(n.timer<=0)fireNeuron(n);
        else if(pulses.length<MAX_PULSES&&Math.random()<0.0008+intensity*0.008)fireNeuron(n);
        n.fire=Math.max(0,n.fire-0.06);
        const g=n.fire,ei=(1+g*4).toFixed(2);
        const r=Math.floor(lerp(40,255,g)),gr=Math.floor(lerp(80,220,g)),b=Math.floor(lerp(220,255,g));
        const col=`rgb(${r},${gr},${b})`;
        n.el.setAttribute('material',`color:${col};emissive:${col};emissiveIntensity:${ei};shader:standard`);
      });

      // Pulses
      for(let i=pulses.length-1;i>=0;i--){
        const p=pulses[i];
        p.t+=p.speed*(1+intensity*1.5);
        if(p.t>=1){
          if(p.el.parentNode)p.el.parentNode.removeChild(p.el);
          p.conn.active=false;
          pulses.splice(i,1);
          // only propagate sometimes to prevent avalanche
          if(Math.random()<0.5)fireNeuron(p.to);
        } else {
          const x=lerp(p.from.pos.x,p.to.pos.x,p.t);
          const y=lerp(p.from.pos.y,p.to.pos.y,p.t);
          const z=lerp(p.from.pos.z,p.to.pos.z,p.t);
          p.el.setAttribute('position',`${x.toFixed(3)} ${y.toFixed(3)} ${z.toFixed(3)}`);
        }
      }

      conns.forEach(c=>{
        const op=c.active?'0.5':'0.18';
        const col=c.active?'#6699ff':'#3355aa';
        c.el.setAttribute('material',`color:${col};opacity:${op};transparent:true;shader:standard`);
      });
    };
  }
});

document.querySelector('a-scene').setAttribute('brain','');
</script>
</body>
</html>
